name: 同步子模块文章

on:
  repository_dispatch:
    types: [sync-posts]

jobs:
  sync_submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出主仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          submodules: true
          fetch-depth: 0

      - name: 更新子模块到最新版本
        run: |
          git submodule sync
          git submodule update --init --remote --force

      - name: 提交并推送更新
        run: |
          git config --global user.name "auto-sync-bot"
          git config --global user.email "bot@github.com"
          git add src/content/posts/同步文章 .gitmodules
          git commit -m "auto: 更新文章子模块" || echo "没有需要提交的更改"
          git push
