name: 自动同步共享文章
on:
  repository_dispatch:
    types: [sync-posts]
  workflow_dispatch:

jobs:
  syncSubmodule:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码并拉取子模块
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GH_TOKEN }}

      - name: 更新远端共享文章
        run: git submodule update --remote --merge src/content/posts/同步文章

      - name: 自动提交推送
        run: |
          git config user.name "auto-sync-bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "auto sync shared posts" || true
          git push
