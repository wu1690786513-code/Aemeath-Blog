name: Trigger Blog Deployments

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'

jobs:
  sync-posts:          # ✅ 改成纯英文 ID
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sigrika-Blog Deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_HOOK_SIGRIKA }}" \
               -H "Content-Type: application/json"

      - name: Trigger Aemeath-Blog Deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_HOOK_AEMEATH }}" \
               -H "Content-Type: application/json"
